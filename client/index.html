            "text": "To recover your security deposit, you should: 1) Know your state's statutory deadline for deposit return (typically 14-60 days after move-out). 2) Document the condition you left the property in with photos and videos. 3) Send a formal demand letter citing your state's specific statutes and penalties. 4) If your landlord doesn't respond, file in small claims court. TenantAdvocate automates steps 2-4 with AI-powered demand letter generation, evidence management, certified mail delivery, and court filing preparation."

          "acceptedAnswer": {
            "@type": "Answer",

          }

          "@type": "Question",
          "name": "What is normal wear and tear vs. damage in a rental?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Normal wear and tear includes: fading or slightly worn paint, minor scuffs on floors, small nail holes from hanging pictures, worn carpet in high-traffic areas, minor scratches on countertops, and slightly dirty grout. Damage includes: large holes in walls, broken windows, pet stains or odors, burn marks, unauthorized paint colors, and broken fixtures. Landlords cannot charge tenants for normal wear and tear — it's the cost of doing business as a landlord."
          }
        },

          "@type": "Question",
          "name": "How long does a landlord have to return a security deposit?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Security deposit return deadlines vary by state: California requires return within 21 days, New York within 14 days, Texas within 30 days, Florida within 15-30 days (depending on whether deductions are claimed), and other states range from 14 to 60 days. TenantAdvocate's 50-state database tracks every state's exact deadline and automatically calculates whether your landlord has violated the statutory timeline."
          }
        },

          "@type": "Question",
          "name": "What penalties can a landlord face for not returning a security deposit?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Penalties vary significantly by state. Many states impose double or triple damages (2x-3x the deposit amount). Some states impose flat fees (e.g., Texas: $100 + 3x). Others require landlords to pay interest on the deposit. California allows 2x damages in bad faith cases. Some states award attorney fees to the tenant. TenantAdvocate automatically calculates the maximum penalties available under your state's specific laws."
          }
        },
        {
          "@type": "Question",
          "name": "How do I write a demand letter for my security deposit?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An effective security deposit demand letter should include: your name and forwarding address, the rental property address, move-in and move-out dates, the deposit amount paid, the statutory deadline that was violated, specific state statutes and penalties that apply, an itemized dispute of any deductions, a specific dollar amount demanded, and a deadline to respond (typically 7-14 days). TenantAdvocate's 4-agent AI team generates professional demand letters that include all of these elements, citing your state's exact statutes."
          }
        },
        {
          "@type": "Question",
          "name": "Can I sue my landlord in small claims court for my security deposit?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Small claims court is the most common venue for security deposit disputes. Filing fees typically range from $30-$75, and you don't need a lawyer. Most states allow claims up to $5,000-$10,000 in small claims court. The key to winning is documentation: a professional demand letter showing you attempted to resolve the dispute, evidence of the property condition at move-out, and knowledge of your state's specific statutes. TenantAdvocate provides all three."
          }
        },
        {
          "@type": "Question",
          "name": "What are my rights as a tenant regarding security deposits?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "As a tenant, you have the right to: receive your deposit back within your state's statutory deadline, receive an itemized list of any deductions, dispute unfair or illegal deductions, collect penalties if your landlord violates the law, sue in small claims court for the return of your deposit plus statutory damages, and in many states, earn interest on your deposit. TenantAdvocate helps you exercise all of these rights with AI-powered legal analysis covering all 50 states."
          }

          }
